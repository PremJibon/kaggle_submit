<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0D14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13161F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89AACC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E85BF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F6FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B8AFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ECC8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE9A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#4F6FFF" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#4F6FFF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#4F6FFF" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#4F6FFF" stroke-width="1"/>
  </g>
  
  <!-- Glowing circles background -->
  <circle cx="200" cy="150" r="150" fill="#4F6FFF" opacity="0.05"/>
  <circle cx="1000" cy="480" r="200" fill="#8B6FFF" opacity="0.05"/>
  <circle cx="600" cy="315" r="250" fill="#2ECC8A" opacity="0.03"/>
  
  <!-- Left side: Chat Interface Mockup -->
  <g transform="translate(60, 100)">
    <!-- Chat window -->
    <rect x="0" y="0" width="380" height="350" rx="12" fill="#1A1E2E" stroke="#252A3D" stroke-width="1"/>
    <rect x="0" y="0" width="380" height="40" rx="12" fill="#13161F"/>
    <rect x="0" y="30" width="380" height="10" fill="#13161F"/>
    <text x="20" y="26" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="14" font-weight="600">Chat with Assistant</text>
    
    <!-- User message -->
    <rect x="120" y="60" width="240" height="40" rx="10" fill="url(#accent)"/>
    <text x="140" y="85" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="12">Add note about meeting</text>
    
    <!-- Bot response -->
    <rect x="20" y="120" width="260" height="40" rx="10" fill="#1F2438" stroke="#252A3D" stroke-width="1"/>
    <text x="40" y="145" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="12">Note added: Meeting Today</text>
    
    <!-- User message 2 -->
    <rect x="140" y="180" width="220" height="40" rx="10" fill="url(#accent)"/>
    <text x="160" y="205" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="12">Search for meeting</text>
    
    <!-- Bot response 2 -->
    <rect x="20" y="240" width="300" height="40" rx="10" fill="#1F2438" stroke="#252A3D" stroke-width="1"/>
    <text x="40" y="265" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="12">Found 3 results for meeting</text>
    
    <!-- Input area -->
    <rect x="20" y="300" width="340" height="35" rx="8" fill="#0B0D14" stroke="#252A3D" stroke-width="1"/>
    <text x="40" y="322" fill="#4A5168" font-family="Inter, sans-serif" font-size="12">Type a command...</text>
  </g>
  
  <!-- Right side: Agent Architecture -->
  <g transform="translate(500, 120)">
    <!-- Central hub -->
    <circle cx="200" cy="180" r="50" fill="#13161F" stroke="url(#accent)" stroke-width="2"/>
    <text x="200" y="175" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Knowledge</text>
    <text x="200" y="192" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" font-weight="600">Assistant</text>
    
    <!-- Agent 1: Ingestion (top) -->
    <line x1="200" y1="130" x2="200" y2="80" stroke="#FF7B4F" stroke-width="2" opacity="0.6"/>
    <circle cx="200" cy="50" r="35" fill="#1A1E2E" stroke="#FF7B4F" stroke-width="2"/>
    <text x="200" y="48" fill="#FF7B4F" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Ingestion</text>
    <text x="200" y="62" fill="#8892A4" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Process</text>
    
    <!-- Agent 2: Retrieval (right) -->
    <line x1="250" y1="180" x2="310" y2="180" stroke="#4F6FFF" stroke-width="2" opacity="0.6"/>
    <circle cx="350" cy="180" r="35" fill="#1A1E2E" stroke="#4F6FFF" stroke-width="2"/>
    <text x="350" y="178" fill="#4F6FFF" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Retrieval</text>
    <text x="350" y="192" fill="#8892A4" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Search</text>
    
    <!-- Agent 3: Synthesis (bottom) -->
    <line x1="200" y1="230" x2="200" y2="280" stroke="#2ECC8A" stroke-width="2" opacity="0.6"/>
    <circle cx="200" cy="310" r="35" fill="#1A1E2E" stroke="#2ECC8A" stroke-width="2"/>
    <text x="200" y="308" fill="#2ECC8A" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Synthesis</text>
    <text x="200" y="322" fill="#8892A4" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Combine</text>
    
    <!-- Agent 4: Organization (left) -->
    <line x1="150" y1="180" x2="90" y2="180" stroke="#8B6FFF" stroke-width="2" opacity="0.6"/>
    <circle cx="50" cy="180" r="35" fill="#1A1E2E" stroke="#8B6FFF" stroke-width="2"/>
    <text x="50" y="178" fill="#8B6FFF" font-family="Inter, sans-serif" font-size="10" text-anchor="middle" font-weight="600">Organization</text>
    <text x="50" y="192" fill="#8892A4" font-family="Inter, sans-serif" font-size="9" text-anchor="middle">Categorize</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="520" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="36" text-anchor="middle" font-weight="800">AI Knowledge Assistant</text>
  
  <!-- Subtitle -->
  <text x="600" y="555" fill="#8892A4" font-family="Inter, sans-serif" font-size="16" text-anchor="middle">Multi-Agent System with Google ADK</text>
  
  <!-- Tags -->
  <g transform="translate(600, 580)">
    <rect x="-200" y="0" width="100" height="24" rx="12" fill="#1A2456"/>
    <text x="-150" y="16" fill="#4F6FFF" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Multi-Agent</text>
    
    <rect x="-80" y="0" width="100" height="24" rx="12" fill="#142B22"/>
    <text x="-30" y="16" fill="#2ECC8A" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">MCP Servers</text>
    
    <rect x="40" y="0" width="100" height="24" rx="12" fill="#221A40"/>
    <text x="90" y="16" fill="#8B6FFF" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Security</text>
    
    <rect x="160" y="0" width="80" height="24" rx="12" fill="#1A1E2E" stroke="#252A3D" stroke-width="1"/>
    <text x="200" y="16" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Google ADK</text>
  </g>
  
  <!-- GitHub badge -->
  <g transform="translate(1020, 20)">
    <rect x="0" y="0" width="160" height="30" rx="6" fill="#1A1E2E" stroke="#252A3D" stroke-width="1"/>
    <text x="80" y="20" fill="#E8ECF6" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">GitHub: PremJibon</text>
  </g>
</svg>